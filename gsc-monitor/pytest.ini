[pytest]
# Configuração única da bateria de testes do GSC Monitor.
# Rode toda a suíte com:  py -m pytest
# (ou um arquivo só:       py -m pytest tests/test_classifier.py -v)
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Coverage roda em toda execução local (--cov). O PISO (--cov-fail-under) é
# aplicado só na CI, para não travar `pytest` de um arquivo só no dia a dia.
# Config de exclusão (tests/, conftest) em .coveragerc.
addopts = -ra -q --cov=. --cov-report=term-missing
