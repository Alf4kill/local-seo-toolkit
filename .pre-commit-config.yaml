# Pre-commit hooks for this repo.
# Enable once:  pip install -r requirements-dev.txt  &&  pre-commit install
#
# All hooks are LOCAL (language: system) — no external repos are downloaded:
#   - block-secrets : zero-dependency secret scanner (scripts/check_secrets.py)
#   - ruff          : lint + format check (config in ruff.toml). Install ruff via
#                     requirements-dev.txt. Mirrors the GitHub Actions CI gate.
repos:
  - repo: local
    hooks:
      - id: block-secrets
        name: Block secrets & credentials
        entry: python scripts/check_secrets.py --staged
        language: system
        pass_filenames: false
        always_run: true
      - id: ruff-check
        name: ruff check (lint)
        entry: ruff check --force-exclude
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: ruff-format
        name: ruff format (check)
        entry: ruff format --check --force-exclude
        language: system
        types_or: [python, pyi]
        require_serial: true
