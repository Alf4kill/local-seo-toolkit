[pytest]
# Bateria de testes do Semantic Analyzer.
# Rode toda a suíte com:  py -m pytest
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Coverage roda em toda execução local (--cov). O PISO (--cov-fail-under) é
# aplicado só na CI. Config de exclusão (tests/, conftest) em .coveragerc.
addopts = -ra -q --cov=. --cov-report=term-missing
