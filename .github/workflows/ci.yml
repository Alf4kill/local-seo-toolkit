name: CI

# Lint (ruff) + suíte de testes (pytest) dos dois pacotes. Todos os testes são
# offline e mockados — não há segredos nem cota de API envolvidos, então a CI
# roda sem nenhum secret configurado.
on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13.14"
      # Versão fixa: garante que `ruff format --check` use exatamente a mesma
      # formatação do requirements-dev.txt / pre-commit local.
      - run: pip install ruff==0.15.16
      - name: ruff check
        run: ruff check .
      - name: ruff format --check
        run: ruff format --check .

  test-gsc-monitor:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gsc-monitor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13.14"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      # PISO de cobertura: trava a fonte no nível atual (medido em 41%). Sobe
      # conforme novos testes entram; nunca desce sem decisão explícita.
      - name: Run tests
        run: python -m pytest --cov-fail-under=40

  test-semantic-analyzer:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: semantic-analyzer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13.14"
      # Deps leves de teste: o núcleo (clusterer/loaders/report/llm/hybrid) roda
      # com numpy + scikit-learn + requests; torch/sentence-transformers são
      # pesados e não são necessários para a suíte (os embeddings reais são
      # mockados). Mantém a CI rápida.
      - name: Install light test deps (skip torch/sentence-transformers)
        run: |
          python -m pip install --upgrade pip
          pip install numpy scikit-learn requests
          pip install -r requirements-dev.txt
      # PISO de cobertura: trava a fonte no nível atual (medido em 40%) sob as
      # deps leves da CI. Sobe conforme novos testes entram.
      - name: Run tests
        run: python -m pytest --cov-fail-under=38

  # Varredura de vulnerabilidades nas dependências dos dois pacotes.
  # NÃO-BLOQUEANTE por enquanto (continue-on-error): reporta CVEs sem reprovar o
  # build. Quando o resultado estiver limpo, remova `continue-on-error` para
  # tornar a checagem obrigatória.
  audit:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13.14"
      - run: pip install pip-audit
      - name: pip-audit (gsc-monitor)
        run: pip-audit -r gsc-monitor/requirements.txt -r gsc-monitor/requirements-dev.txt
      - name: pip-audit (semantic-analyzer)
        run: pip-audit -r semantic-analyzer/requirements.txt -r semantic-analyzer/requirements-dev.txt
